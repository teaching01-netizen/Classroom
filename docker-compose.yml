version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qr-command-center-db
    environment:
      POSTGRES_USER: qruser
      POSTGRES_PASSWORD: qrpassword
      POSTGRES_DB: qrcommandcenter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
